name: Publish to Maven Central
on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0

jobs:
  build-iree-shim:
    uses: ./.github/workflows/native-build-job.yml
    permissions:
      contents: read

  publish:
    runs-on: ubuntu-latest
    needs: build-iree-shim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Derive release version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          case "$version" in
            *SNAPSHOT*) echo "Refusing to publish a SNAPSHOT from tag '$tag'"; exit 1;;
          esac
          echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$' \
            || { echo "Tag '$tag' is not a valid release version"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download the libiree_djl shim
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ needs.build-iree-shim.outputs.artifact-pattern }}
          path: build/native-staging/
          merge-multiple: true
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
          
      - name: Publish to Central Portal
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}
        run: >-
          ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
          -PreleaseVersion=${{ steps.version.outputs.version }}