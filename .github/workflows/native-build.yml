name: IREE Engine Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iree-shim:
    uses: ./.github/workflows/native-build-job.yml
    permissions:
      contents: read
 
  # setup-java action repo: https://github.com/actions/setup-java
  build-java-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    needs: build-iree-shim
    steps:
        - uses: actions/checkout@v7
        - uses: actions/setup-java@v5
          with:
            distribution: zulu
            java-version: 17
        
          # Because the artifact isn't the full `src/main/resources/native`
          # we need to give `download-artifact` a target path
        - name: Download the libiree_djl shim
          uses: actions/download-artifact@v8
          with:
            pattern: iree-libs-*
            path: src/main/resources/native/
            merge-multiple: true
        
        # Debug print
        - run: tree -h src/main/resources/native

        # https://github.com/gradle/actions
        # This has enhanced caching 
        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v6
        - name: Build and test the Java package
          run: |
              ./gradlew build
              ./gradlew test
              ./gradlew leakTest

